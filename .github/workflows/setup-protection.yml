name: Setup Branch Protection

on:
  workflow_dispatch:

# Branch protection requires a token with 'repo' admin scope.
# Store a Personal Access Token (classic) with full 'repo' scope
# as a repository secret named ADMIN_PAT.
# See: https://github.com/settings/tokens

jobs:
  protect:
    name: Configure branch protection rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Apply branch protection rules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const common = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              required_status_checks: {
                strict: true,
                contexts: ['TypeScript', 'Lint', 'Tests'],
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
            };

            for (const branch of ['main', 'develop']) {
              await github.rest.repos.updateBranchProtection({
                ...common,
                branch,
              });
              core.info(`✅ Branch '${branch}' protected.`);
            }
