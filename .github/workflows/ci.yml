name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: if [ -f package.json ]; then npm install && npx turbo typecheck; else echo "No package.json found — skipping typecheck"; fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: if [ -f package.json ]; then npm install && npx turbo lint; else echo "No package.json found — skipping lint"; fi

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: if [ -f package.json ]; then npm install && npx turbo test; else echo "No package.json found — skipping tests"; fi
